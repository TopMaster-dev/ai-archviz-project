<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arch-Material AI - 建築建材・AIレンダリング統合プラットフォーム</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN (Development only) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                    },
                    // --- デザインシステム トークン（UIリニューアル Unit 0）---
                    // すべて「追加」のみ。既定の Tailwind スケール（text-/rounded- 等）は上書きせず、
                    // 既存クラスの見た目は不変。各ページ改修時にこれらの新トークンへ順次移行する。
                    colors: {
                        surface: { base: '#050505', raised: '#0d0d0d', overlay: '#111111', sunken: '#080808' },
                        line: { subtle: 'rgba(255,255,255,0.10)', DEFAULT: 'rgba(255,255,255,0.16)', strong: 'rgba(255,255,255,0.24)' },
                        accent: { DEFAULT: '#10b981', hover: '#34d399', soft: 'rgba(16,185,129,0.12)', ring: '#34d399' },
                        danger: { DEFAULT: '#ef4444', soft: 'rgba(239,68,68,0.12)' },
                        warn: { DEFAULT: '#f59e0b', soft: 'rgba(245,158,11,0.12)' },
                    },
                    fontSize: {
                        '2xs': ['11px', '15px'], // 最小密度テキストの下限（11px未満は使わない）
                    },
                    boxShadow: {
                        e1: '0 1px 2px rgba(0,0,0,0.4)',
                        e2: '0 4px 12px rgba(0,0,0,0.45)',
                        e3: '0 8px 24px rgba(0,0,0,0.5)',
                        e4: '0 16px 48px rgba(0,0,0,0.6)', // モーダル
                    },
                    zIndex: { canvas: '10', sidebar: '20', toolbar: '30', panel: '40', modal: '1000', toast: '1100', critical: '9999' },
                },
            },
        }
    </script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0?external=react,react-dom,three",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7?external=react,react-dom,three,@react-three/fiber",
    "three": "https://esm.sh/three@0.182.0",
    "three/": "https://esm.sh/three@0.182.0/",
    "three-stdlib": "https://esm.sh/three-stdlib@2.33.0?external=three",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "cloudinary": "https://esm.sh/cloudinary@^2.9.0",
    "@fal-ai/serverless-client": "https://esm.sh/@fal-ai/serverless-client@^0.15.0",
    "@fal-ai/client": "https://esm.sh/@fal-ai/client@^1.9.1"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
